databases:
  - name: jetleads-db
    databaseName: jetleads
    user: jetleads
    plan: free

services:
  - type: web
    name: jetleads-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jetleads-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: "false"

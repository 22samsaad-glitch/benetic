databases:
  - name: benetic-db
    databaseName: benetic
    user: benetic
    plan: free

services:
  - type: web
    name: benetic-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: benetic-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: "false"

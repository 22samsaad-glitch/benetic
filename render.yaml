services:
  - type: web
    name: jetleads-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jetleads-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

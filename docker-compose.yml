services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: benetic
      POSTGRES_PASSWORD: benetic_dev
      POSTGRES_DB: benetic_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benetic"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://benetic:benetic_dev@db:5432/benetic_leads
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    working_dir: /app

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://benetic:benetic_dev@db:5432/benetic_leads
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    working_dir: /app

  beat:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://benetic:benetic_dev@db:5432/benetic_leads
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    working_dir: /app

volumes:
  pgdata:
